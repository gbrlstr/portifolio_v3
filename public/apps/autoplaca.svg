<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradientes otimizados para favicon -->
    <linearGradient id="plateGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f1f3f4;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e3a8a;stop-opacity:1" />
    </linearGradient>
    
    <radialGradient id="lensGrad" cx="30%" cy="30%" r="70%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#e9ecef;stop-opacity:0.3" />
    </radialGradient>
    
    <radialGradient id="rimGrad" cx="50%" cy="30%" r="70%">
      <stop offset="0%" style="stop-color:#6c757d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#343a40;stop-opacity:1" />
    </radialGradient>
    
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="1" dy="2" stdDeviation="1" flood-color="#000000" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- Placa brasileira simplificada -->
  <rect x="6" y="12" rx="3" ry="3" width="52" height="40" 
        fill="url(#plateGrad)" 
        stroke="#2c3e50" 
        stroke-width="1.5" 
        filter="url(#shadow)"/>
  
  <!-- Faixa azul superior -->
  <rect x="8" y="14" rx="2" ry="2" width="48" height="10" 
        fill="url(#blueGrad)"/>
  
  <!-- Borda amarela -->
  <rect x="8" y="23" width="48" height="1" fill="#FFD600"/>
  
  <!-- Texto "BRASIL" simplificado -->
  <text x="32" y="20" 
        font-family="Arial, sans-serif" 
        font-size="6" 
        font-weight="bold" 
        fill="#ffffff" 
        text-anchor="middle" 
        dominant-baseline="middle" 
        letter-spacing="0.5px">BRASIL</text>
  
  <!-- Bandeira do Brasil minimalista -->
  <g transform="translate(50, 19)">
    <rect x="-4" y="-2.5" width="8" height="5" rx="0.5" fill="#009639"/>
    <path d="M 0,-2 L 3,0 L 0,2 L -3,0 Z" fill="#FEDF00"/>
    <circle cx="0" cy="0" r="1.2" fill="#002776"/>
    <rect x="-1.2" y="-0.3" width="2.4" height="0.6" fill="#ffffff" opacity="0.9"/>
  </g>
  
  <!-- Área branca inferior -->
  <rect x="8" y="24" rx="2" ry="2" width="48" height="26" 
        fill="url(#plateGrad)"/>
  
  <!-- Texto "AP" (iniciais AutoPlaca) na área branca -->
  <text x="32" y="38" 
        font-family="Arial, sans-serif" 
        font-size="12" 
        font-weight="800" 
        fill="#2c3e50" 
        text-anchor="middle" 
        dominant-baseline="middle" 
        letter-spacing="1px">AP</text>
  
  <!-- Lupa otimizada para favicon -->
  <g transform="translate(48, 44)" filter="url(#shadow)">
    <!-- Aro da lupa -->
    <circle cx="0" cy="0" r="8" fill="url(#rimGrad)" stroke="#2c3e50" stroke-width="0.8"/>
    
    <!-- Lente -->
    <circle cx="0" cy="0" r="6" fill="url(#lensGrad)" stroke="#dee2e6" stroke-width="0.3"/>
    
    <!-- Reflexo principal -->
    <ellipse cx="-2" cy="-2" rx="2.5" ry="1.5" fill="#ffffff" fill-opacity="0.6" transform="rotate(-15)"/>
    
    <!-- Cabo da lupa -->
    <line x1="6" y1="6" x2="11" y2="11" stroke="url(#rimGrad)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="5.5" y1="5.5" x2="9" y2="9" stroke="#8E9AAF" stroke-width="0.8" stroke-linecap="round"/>
    
    <!-- Ponteira do cabo -->
    <circle cx="11" cy="11" r="1.5" fill="url(#rimGrad)"/>
  </g>
</svg>
